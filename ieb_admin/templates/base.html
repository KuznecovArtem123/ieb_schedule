<!doctype html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ИЭБ - {% block title %}Админ Панель {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/admin_style.css' %}">
    <link rel="stylesheet" href="{% static 'css/reset.css' %}">
    {% block extra_css %}{% endblock extra_css %}
  </head>
  <body>
    <header class="header">
        <a class="header__info" href="{% url 'panel' %}">
            <img src="{% static 'img/ineb_logo.png' %}" alt="ИНЭБ Логотип" class="header__logo">
            <h2 class="header__title">Админ Панель ИЭБ</h2>
        </a>

        <nav class="header__nav">  
            <a class="header__link" href='{% url 'panel' %}'>Расписание</a>
            <a class="header__link" href='{% url 'groups' %}'>Группы</a>
            <a class="header__link" href='{% url 'teachers' %}'>Преподаватели</a>
            <a class="header__logout button button--primary" href="{% url 'logout' %}">Выйти</a>
        </nav>
    </header>
    <div class="main">
        {% block content %}

        {% endblock %}
    </div>
    {% include "components/messages.html" %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
