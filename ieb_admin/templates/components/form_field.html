<div class="mb-3">
    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
        <small class="text-muted d-block">{{ field.help_text }}</small>
    {% endif %}
    {% for error in field.errors %}
        <div class="text-danger small d-block">{{ error }}</div>
    {% endfor %}
</div>
