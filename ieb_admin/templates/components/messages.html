{% if messages %}
<div class="messages-toast" aria-live="polite" aria-atomic="true">
    {% for message in messages %}
    <div class="alert alert-{% if message.level_tag == 'error' %}danger{% else %}{{ message.level_tag }}{% endif %} alert-dismissible fade show shadow-sm" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Закрыть"></button>
    </div>
    {% endfor %}
</div>
{% endif %}
