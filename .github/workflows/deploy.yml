name: Deploy Django with Docker

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Connect to VM and Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # 1. Переходим в папку со склонированным проектом
          cd ../../opt/ineb/ieb_schedule
          
          # 2. Подтягиваем изменения из GitHub
          git pull origin main
          
          # 3. Говорим Docker Compose пересобрать образ и перезапустить контейнеры
          # Флаг --build обновит код, -d запустит всё в фоне
          docker-compose up --build -d
          
          # 4. Опционально: очищаем старые неиспользуемые слои докера, чтобы не забивать диск
          docker image prune -f